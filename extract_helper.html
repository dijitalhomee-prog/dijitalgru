<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Extractor</title>
</head>
<body>
  <h1>Extractor</h1>
  <div id="status">Loading...</div>
  <pre id="output"></pre>
  <script>
    const pbUrl = 'file:///Users/egemengunes/.gemini/antigravity/conversations/9de16cff-3547-4dbc-bd1e-2c3fae9a9d31.pb';
    fetch(pbUrl)
      .then(res => {
        if (!res.ok) throw new Error("HTTP error " + res.status);
        return res.arrayBuffer();
      })
      .then(buf => {
        const uint8 = new Uint8Array(buf);
        const decoder = new TextDecoder('utf-8', { fatal: false });
        const str = decoder.decode(uint8);
        
        const idx = str.indexOf("Dijital Ajans Seçerken");
        if (idx !== -1) {
          const start = Math.max(0, idx - 200);
          const chunk = str.substring(start, start + 30000);
          document.getElementById('status').textContent = 'Success!';
          document.getElementById('output').textContent = chunk;
        } else {
          document.getElementById('status').textContent = 'Not found in pb file. Total length: ' + str.length;
        }
      })
      .catch(err => {
        document.getElementById('status').textContent = 'Error: ' + err.message;
      });
  </script>
</body>
</html>
